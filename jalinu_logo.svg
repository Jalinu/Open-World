<svg width="100%" viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Jalinu gaming logo</title>
<desc>An esports-style badge logo: a dark hexagon shield with a cyan-to-magenta gradient border, a bold slanted lightning-bolt J emblem, and the bold italic wordmark JALINU both set inside the hexagon, with speed lines on either side.</desc>
<defs>
  <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00E5FF"/>
    <stop offset="100%" stop-color="#FF2E9A"/>
  </linearGradient>
  <linearGradient id="gg2" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FF2E9A"/>
    <stop offset="100%" stop-color="#00E5FF"/>
  </linearGradient>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <clipPath id="hexclip">
    <polygon points="400.0,64.0 569.7,162.0 569.7,358.0 400.0,456.0 230.3,358.0 230.3,162.0"/>
  </clipPath>
</defs>

<polygon points="400.0,50.0 581.9,155.0 581.9,365.0 400.0,470.0 218.1,365.0 218.1,155.0" fill="url(#gg)"/>
<polygon points="400.0,64.0 569.7,162.0 569.7,358.0 400.0,456.0 230.3,358.0 230.3,162.0" fill="#0A0D14"/>

<line x1="150" y1="190" x2="200" y2="190" stroke="url(#gg)" stroke-width="6" stroke-linecap="round"/>
<line x1="128" y1="366" x2="178" y2="366" stroke="url(#gg)" stroke-width="6" stroke-linecap="round"/>
<line x1="106" y1="542" x2="156" y2="542" stroke="url(#gg)" stroke-width="6" stroke-linecap="round"/>
<line x1="84" y1="718" x2="134" y2="718" stroke="url(#gg)" stroke-width="6" stroke-linecap="round"/>
<line x1="600" y1="330" x2="650" y2="330" stroke="url(#gg)" stroke-width="6" stroke-linecap="round"/>
<line x1="622" y1="154" x2="672" y2="154" stroke="url(#gg)" stroke-width="6" stroke-linecap="round"/>
<line x1="644" y1="-22" x2="694" y2="-22" stroke="url(#gg)" stroke-width="6" stroke-linecap="round"/>
<line x1="666" y1="-198" x2="716" y2="-198" stroke="url(#gg)" stroke-width="6" stroke-linecap="round"/>

<g clip-path="url(#hexclip)">
  <polygon points="372.0,120.0 422.0,120.0 380.0,220.0 428.0,220.0 358.0,330.0 394.0,220.0 352.0,220.0" fill="url(#gg2)" filter="url(#glow)"/>
  <text x="400" y="380" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-style="italic" font-size="54" letter-spacing="2" fill="url(#gg)">JALINU</text>
</g>
</svg>